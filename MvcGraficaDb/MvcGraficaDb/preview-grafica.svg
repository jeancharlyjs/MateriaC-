<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Grafica de ventas por mes</title>
  <desc id="desc">Grafica de barras con ventas desde enero hasta julio.</desc>
  <rect width="1100" height="620" fill="#f6f7fb"/>
  <rect x="54" y="44" width="992" height="530" rx="8" fill="#ffffff" stroke="#dbe3ef"/>
  <text x="90" y="102" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#172033">Grafica de ventas por mes</text>
  <text x="90" y="132" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#64748b">Datos de ejemplo cargados desde SQLite usando Entity Framework Core.</text>

  <line x1="110" y1="500" x2="1000" y2="500" stroke="#dbe3ef"/>
  <line x1="110" y1="422" x2="1000" y2="422" stroke="#dbe3ef"/>
  <line x1="110" y1="344" x2="1000" y2="344" stroke="#dbe3ef"/>
  <line x1="110" y1="266" x2="1000" y2="266" stroke="#dbe3ef"/>
  <line x1="110" y1="188" x2="1000" y2="188" stroke="#dbe3ef"/>

  <text x="61" y="505" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#64748b">RD$ 0</text>
  <text x="42" y="427" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#64748b">RD$ 10k</text>
  <text x="42" y="349" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#64748b">RD$ 20k</text>
  <text x="42" y="271" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#64748b">RD$ 30k</text>
  <text x="42" y="193" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#64748b">RD$ 40k</text>

  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <rect x="140" y="356" width="72" height="144" rx="6" fill="#2563eb"/>
    <text x="176" y="340" font-size="13" fill="#172033">RD$ 18,500</text>
    <text x="176" y="532" font-size="14" fill="#172033">Enero</text>

    <rect x="263" y="328" width="72" height="172" rx="6" fill="#2563eb"/>
    <text x="299" y="312" font-size="13" fill="#172033">RD$ 22,100</text>
    <text x="299" y="532" font-size="14" fill="#172033">Febrero</text>

    <rect x="386" y="346" width="72" height="154" rx="6" fill="#2563eb"/>
    <text x="422" y="330" font-size="13" fill="#172033">RD$ 19,800</text>
    <text x="422" y="532" font-size="14" fill="#172033">Marzo</text>

    <rect x="509" y="295" width="72" height="205" rx="6" fill="#2563eb"/>
    <text x="545" y="279" font-size="13" fill="#172033">RD$ 26,300</text>
    <text x="545" y="532" font-size="14" fill="#172033">Abril</text>

    <rect x="632" y="257" width="72" height="243" rx="6" fill="#2563eb"/>
    <text x="668" y="241" font-size="13" fill="#172033">RD$ 31,200</text>
    <text x="668" y="532" font-size="14" fill="#172033">Mayo</text>

